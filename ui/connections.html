<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Set up Beacon</title>
    <link rel="stylesheet" href="macos-native.css" />
    <link rel="stylesheet" href="connections.css" />
  </head>
  <body class="sheet">
    <header class="sheet-header">
      <h1>Which apps should light up?</h1>
      <p class="subtitle">
        Turn on the tools you use. Each gets its own floating orb on your desktop.
      </p>
    </header>
    <main id="install-banner" class="callout" hidden></main>
    <main id="list"></main>
    <footer class="sheet-page-footer">
      <p>
        Leave Beacon running. After you turn something on, restart that app once.
        Right-click the orb for sound, notifications, and more.
      </p>
    </footer>
    <script src="connections-ui.js"></script>
  </body>
</html>
